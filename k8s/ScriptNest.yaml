# ==============================================================
# ScriptNest Blog Platform - Docker Hub Version
# ==============================================================

apiVersion: v1
kind: Namespace
metadata:
  name: scriptnest
---
apiVersion: v1
kind: Secret
metadata:
  name: scriptnest-db-secret
  namespace: scriptnest
type: Opaque
data:
  POSTGRES_USER: amVybmV5X3VzZXI=
  POSTGRES_PASSWORD: amVybmV5X3Bhc3NfMjAyNg==
  POSTGRES_DB: amVybmV5X2Ri
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: scriptnest-ebs-sc
provisioner: ebs.csi.eks.amazonaws.com
parameters:
  type: gp3
  encrypted: "true"
reclaimPolicy: Retain
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: scriptnest-db-pvc
  namespace: scriptnest
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: scriptnest-ebs-sc
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scriptnest-db
  namespace: scriptnest
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: scriptnest-db
  template:
    metadata:
      labels:
        app: scriptnest-db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: scriptnest-db-secret
          volumeMounts:
            - name: db-storage
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
      volumes:
        - name: db-storage
          persistentVolumeClaim:
            claimName: scriptnest-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: scriptnest-db
  namespace: scriptnest
spec:
  type: ClusterIP
  selector:
    app: scriptnest-db
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scriptnest-backend
  namespace: scriptnest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scriptnest-backend
  template:
    metadata:
      labels:
        app: scriptnest-backend
    spec:
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z scriptnest-db 5432; do echo waiting for db; sleep 2; done;']
      containers:
        - name: backend
          # Exact Docker Hub image name
          image: pushpakz/scriptnest-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: DB_HOST
              value: "scriptnest-db"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: scriptnest-db-secret
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: scriptnest-db-secret
                  key: POSTGRES_PASSWORD
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: scriptnest-db-secret
                  key: POSTGRES_DB
---
apiVersion: v1
kind: Service
metadata:
  name: scriptnest-backend
  namespace: scriptnest
spec:
  type: ClusterIP
  selector:
    app: scriptnest-backend
  ports:
    - port: 5000
      targetPort: 5000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scriptnest-frontend
  namespace: scriptnest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scriptnest-frontend
  template:
    metadata:
      labels:
        app: scriptnest-frontend
    spec:
      containers:
        - name: frontend
          # Exact Docker Hub image name
          image: pushpakz/scriptnest-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: scriptnest-frontend
  namespace: scriptnest
spec:
  type: NodePort
  selector:
    app: scriptnest-frontend
  ports:
    - port: 80
      targetPort: 8080
